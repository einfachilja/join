<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Add Task</title>
    <link rel="stylesheet" href="./styles/desktop.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/add_task.css">
    <link rel="shortcut icon" href="/assets/img/join-logo-dark.svg" type="image/x-icon">
</head>

<body>

    <header>
        <p>Kanban Project Management Tool</p>
        <div class="user-container">
            <a href="help.html"><img class="help-icon" src="/assets/icons/help-icon.svg" alt=""></a>
            <span class="user-icon">G</span>
        </div>
    </header>

    <div class="container">

        <aside>
            <nav>
                <div class="nav-container">
                    <img class="logo" src="/assets/img/join-logo-white.svg" alt="">
                    <div class="nav-box">
                        <a href="/summary.html"><img src="/assets/icons/summary-icon.svg" alt="">Summary</a>
                        <a href="/add_task.html"><img src="/assets/icons/add-task-icon.svg" alt="">Add Task</a>
                        <a href="/board.html"><img src="/assets/icons/board-icon.svg" alt="">Board</a>
                        <a href="/contacs.html"><img src="/assets/icons/contacts-icon.svg" alt="">Contacts</a>
                    </div>
                </div>
                <div class="nav-box-privacy-legal">
                    <a href="/privacy_policy.html">Privacy Policy</a>
                    <a href="/legal_notice.html">Legal Notice</a>
                </div>
            </nav>
        </aside>

        <section class="content">
            <div class="add-task-container">
                <div class="add-task-header">
                    <h1>Add Task</h1>
                </div>
                <div class="add-task-main">
                    <div class="add-task-main-left">
                        <label for="title">Title*</label>
                        <input class="title" type="text" id="title" placeholder="Enter a title">
                        <label for="description">Description</label>
                        <textarea class="description" name="" id="description"
                            placeholder="Enter a Description"></textarea>
                        <label for="date">Due date*</label>
                        <input class="date" type="date">
                    </div>

                    <img class="add-task-separator" src="./assets/icons/add-task-line-icon.svg" alt="">

                    <div class="add-task-main-right">
                        <label for="title">Priority</label>
                        <div class="add-task-priority-box">
                            <div class="add-task-priority-btn">Urgent <img
                                    src="./assets/icons/add-task-priority-urgent-icon.svg" alt=""></div>
                            <div class="add-task-priority-btn">Medium <img
                                    src="./assets/icons/add-task-priority-medium-icon.svg" alt=""></div>
                            <div class="add-task-priority-btn">Low <img
                                    src="./assets/icons/add-task-priority-low-icon.svg" alt=""></div>
                        </div>
                        <label for="assigned">Assigned to</label>
                        <input class="assigned" type="text" id="assigned" placeholder="Select contacts to assign">
                        <label for="category">Category*</label>
                        <input class="category" type="text" id="category" placeholder="Select task category">
                        <label for="subtasks">Subtasks*</label>
                        <input class="subtasks" type="text" id="subtasks" placeholder="Add new subtask">
                    </div>
                </div>
                <div class="add-task-footer">
                    <span>*This field is required</span>
                    <div class="add-task-footer-box">
                        <button class="add-task-clear-btn">Clear <img src="./assets/icons/add-task-clear-btn-icon.svg"
                                alt=""></button>
                        <button class="add-task-create-task-btn">Create Task <img
                                src="./assets/icons/add-task-create-task-btn-icon.svg" alt=""></button>
                    </div>
                </div>

            </div>
        </section>

    </div>

</body>

</html>
