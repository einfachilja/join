<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Log in</title>
    <link rel="shortcut icon" href="./assets/img/join-logo-dark.svg" type="image/x-icon">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <header class="max-width">
        <a href="index.html"><img class="logo" src="./assets/img/join-logo-dark.svg" alt=""></a>
        <nav>
            Not a Join user?
            <a class="signup-btn" href="register.html">Sign up</a>
        </nav>
    </header>

    <section class="section-login">
        <div class="form-container">
            <div class="form-header">
                <h1>Log in</h1>
                <img src="./assets/icons/login-line-icon.svg" alt="">
            </div>
            <form>
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email" required>
                    <img class="input-icon" src="./assets/icons/mail-icon.svg" alt="">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                    <img class="input-icon" src="./assets/icons/lock-icon.svg" alt="">
                </div>
                <div class="btn-container">
                    <button class="login-btn">Log in</button>
                    <a href="summary.html" class="guest-login-btn">Guest Log in</a>
                </div>
            </form>
        </div>
    </section>

    <footer>
        <a href="privacy_policy.html">Privacy Policy</a>
        <a href="legal_notice.html">Legal Notice</a>
    </footer>

</body>

</html>
