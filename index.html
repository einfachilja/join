<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Login</title>
    <link rel="shortcut icon" href="./assets/img/join-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="max-width">
        <a href="index.html"><img class="logo" src="./assets/img/join-logo.png" alt=""></a>
        <nav>
            <b>Not a Join user?</b>
            <a class="signup-btn" href="register.html">Sign up</a>
        </nav>
    </header>

    <section class="section-login">
        <div class="form-container">
            <h1>Log in</h1>
            <form>
                <input type="email" id="email" placeholder="E-Mail">
                <input type="password" id="password" placeholder="Password">
                <div class="btn-container">
                    <button class="login-btn">Log in</button>
                    <button class="guest-login-btn">Guest Log in</button>
                </div>
            </form>
        </div>
    </section>

    <footer>
        <a href="">Privacy Policy</a>
        <a href="">Legal Notice</a>
    </footer>

</body>

</html>
