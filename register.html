<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Sign up</title>
    <link rel="shortcut icon" href="./assets/img/join-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="max-width">
        <a href="index.html"><img class="logo" src="./assets/img/join-logo.png" alt=""></a>
    </header>

    <section class="section-login">
        <div class="form-container">
            <a  href="index.html"><img class="arrow-back" src="./assets/icons/arrow-left-line.png" alt=""></a>
            <h1>Sign up</h1>
            <form>
                <div class="input-group">
                <input type="text" id="name" placeholder="Name" required>
                <img class="input-icon" src="./assets/icons/person.png" alt="">
                </div>
                <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
                <img class="input-icon" src="./assets/icons/mail.png" alt="">
                </div>
                <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
                <img class="input-icon" src="./assets/icons/lock.png" alt="">
                </div>
                <div class="input-group">
                <input type="password" id="confirm_password" placeholder="Confirm Password" required>
                <img class="input-icon" src="./assets/icons/lock.png" alt="">
                </div>
                <div class="checkbox-container">
                    <input class="checkbox" type="checkbox" required>
                    <span>I accept the <a class="privacy-policy-link" href="#">Privacy Policy</a></span>
                </div>
                <div class="btn-container">
                    <button class="login-btn">Sign up</button>
                </div>
            </form>
        </div>
    </section>

    <footer>
        <a href="">Privacy Policy</a>
        <a href="">Legal Notice</a>
    </footer>

</body>

</html>
