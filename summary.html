<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Summary</title>
    <link rel="shortcut icon" href="./assets/img/join-logo-dark.svg" type="image/x-icon">
    <link rel="stylesheet" href="./styles/summary.css">
    <link rel="stylesheet" href="./styles/desktop.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <script src="scripts/summary.js"></script>

</head>

<body onload="greetUser()">

    <header>
        <p>Kanban Project Management Tool</p>
        <div class="user-container">
            <a href="help.html"><img class="help-icon" src="/assets/icons/help-icon.svg" alt=""></a>
            <span class="user-icon">G</span>
        </div>
    </header>

    <aside>
        <nav>
            <div class="nav-container">
                <img class="logo" src="./assets/img/join-logo-white.svg" alt="">
                <div class="nav-box">
                    <a href="summary.html"><img src="./assets/icons/summary-icon.svg" alt="">Summary</a>
                    <a href="add_task.html"><img src="./assets/icons/add-task-icon.svg" alt="">Add Task</a>
                    <a href="board.html"><img src="./assets/icons/board-icon.svg" alt="">Board</a>
                    <a href="contacs.html"><img src="./assets/icons/contacts-icon.svg" alt="">Contacts</a>
                </div>
            </div>
            <div class="nav-box-privacy-legal">
                <a href="privacy_policy.html">Privacy Policy</a>
                <a href="legal_notice.html">Legal Notice</a>
            </div>
        </nav>
    </aside>

    <section class="content">
        <div class="summary-container">
            <div class="summary-header">
                <h1>Join 360</h1>
                <img src="./assets/icons/summary-line-icon.svg" alt="">
                <span class="summary-subtitle">Key Metrics at a Glance</span>
            </div>
            <div class="summary-main">
                <div class="card-container">
                    <div class="card-container-left">
                        <div class="card-box-top">
                            <div class="card-top">
                                <div class="summary-to-do-icon"></div>
                                <div class="card-top-text">
                                    <div class="summary-card-number">1</div>
                                    <div class="summary-card-text">To-Do</div>
                                </div>
                            </div>
                            <div class="card-top">
                                <div class="summary-done-icon"></div>
                                <div class="card-top-text">
                                    <div class="summary-card-number">1</div>
                                    <div class="summary-card-text">Done</div>
                                </div>
                            </div>
                        </div>
                        <div class="card-box-center">
                            <div class="card-center">
                                <div class="card-center-left">
                                    <img src="./assets/icons/summary-urgent-icon.svg" alt="">
                                    <div class="card-center-text">
                                        <div class="summary-card-number">5</div>
                                        <div class="summary-card-text">Tasks<br>in Board</div>
                                    </div>
                                </div>
                                <img src="./assets/icons/summary-center-line-icon.svg" alt="">
                                <div class="card-center-right">
                                    <span class="summary-date">October 16, 2022</span>
                                    <span class="summary-date-subline">Upcoming Deadline</span>
                                </div>
                            </div>
                        </div>
                        <div class="card-box-bottom">
                            <div class="card-bottom">
                                <div class="summary-card-number">5</div>
                                <div class="summary-card-text">Tasks<br>in Board</div>
                            </div>
                            <div class="card-bottom">
                                <div class="summary-card-number">2</div>
                                <div class="summary-card-text">Tasks<br>in Progress</div>
                            </div>
                            <div class="card-bottom">
                                <div class="summary-card-number">2</div>
                                <div class="summary-card-text">Awaiting<br>Feedback</div>
                            </div>
                        </div>
                    </div>
                    <div class="card-container-right">
                        <span id="greets" class="greets"></span>
                    </div>
                </div>
            </div>
        </div>
    </section>



</body>

</html>
